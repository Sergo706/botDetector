name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read
 
jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Lint & Types
        run: npx tsc --noEmit && npm run lint
          
      - name: Publish to NPM
        run: npm publish --access public

      - name: Dependencies (create)
        run: npm ci
        working-directory: create

      - name: Lint & Types
        run: npx tsc --noEmit && npm run lint
        
      - name: Publish create to NPM
        run: npm publish --access public
        working-directory: create