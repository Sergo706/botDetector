name: CI
permissions:
  contents: write
  pull-requests: write
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.gitattributes') }}

      - name: Fetch LFS objects
        run: git lfs pull

      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache mmdbctl
        id: mmdbctl-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/mmdbctl
          key: mmdbctl-1.4.9

      - name: Install mmdbctl
        if: steps.mmdbctl-cache.outputs.cache-hit != 'true'
        run: curl -Ls https://github.com/ipinfo/mmdbctl/releases/download/mmdbctl-1.4.9/deb.sh | sh
      
      - name: Dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify Build
        run: npm run build

      - name: Coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npx coverage-badges-cli --source coverage/coverage-summary.json --output badges/coverage.svg

      - name: Statistics
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cpr
        run: |
          rm -rf bot-detector-logs
          npx vitest run test/e2e/http.stress.test.ts
          python3 scripts/benchmark.py bot-detector-logs/info.log benchmarks.md

      - name: Create Pull Request for Benchmarks
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update coverage badge and benchmarks"
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: automation/update-benchmarks
          title: "Chore: Update Benchmarks and Coverage"
          body: "Automated benchmark results from stress tests."
          base: main
          delete-branch: true